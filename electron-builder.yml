appId: com.ritikjangir.squish
productName: Squish
copyright: Copyright © 2026 Ritik Jangir

directories:
  buildResources: assets
  output: release # changed from dist — avoids conflict with Vite's output

files:
  - dist/**/* # renderer (built by Vite)
  - dist-electron/**/* # main process + preload

win:
  target:
    - nsis
    - portable
  icon: assets/icon.ico

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  shortcutName: Squish

mac:
  target:
    - dmg
    - zip
  icon: assets/icon.icns

linux:
  target:
    - AppImage
    - deb
  icon: assets/icon.png
